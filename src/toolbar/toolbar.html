<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />

		<title>Toolbar</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="./toolbar.css" />
	</head>
	<body>
		<div class="bar" id="bar">
			<div class="sep"></div>

			<button class="btn" id="back" title="Go back" disabled>
				<svg
					width="14"
					height="14"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2.2"
				>
					<polyline points="15 18 9 12 15 6" />
				</svg>
			</button>
			<button class="btn" id="fwd" title="Go forward" disabled>
				<svg
					width="14"
					height="14"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2.2"
				>
					<polyline points="9 18 15 12 9 6" />
				</svg>
			</button>
			<button class="btn" id="reload" title="Reload">
				<svg
					id="ri"
					width="14"
					height="14"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2.2"
				>
					<polyline points="23 4 23 10 17 10" />
					<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
				</svg>
			</button>
			<div class="title" id="title">Loading...</div>
			<span class="badge" id="badge"></span>
		</div>

		<script src="./toolbar.js"></script>
	</body>
</html>
