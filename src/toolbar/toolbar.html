<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'"
    />
    <title>Toolbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1c1c22;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e0e0ec;
        --text2: #8888aa;
        --btn-hover: rgba(255, 255, 255, 0.1);
        --btn-active: rgba(255, 255, 255, 0.18);
        --radius: 7px;
      }

      html,
      body {
        width: 100%;
        height: 44px;
        overflow: hidden;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      .toolbar {
        display: flex;
        align-items: center;
        height: 44px;
        /* 80px left padding = space for macOS traffic lights */
        padding: 0 14px 0 80px;
        gap: 4px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        -webkit-app-region: drag;
        position: relative;
      }

      .toolbar::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 0;
        right: 0;
        height: 8px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.15),
          transparent
        );
        pointer-events: none;
      }

      .btn {
        width: 30px;
        height: 30px;
        border-radius: var(--radius);
        border: none;
        background: none;
        color: var(--text2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        -webkit-app-region: no-drag;
        transition:
          background 0.12s,
          color 0.12s,
          opacity 0.12s;
      }
      .btn:hover:not(:disabled) {
        background: var(--btn-hover);
        color: var(--text);
      }
      .btn:active:not(:disabled) {
        background: var(--btn-active);
      }
      .btn:disabled {
        opacity: 0.28;
        cursor: default;
      }

      .btn-divider {
        width: 1px;
        height: 16px;
        background: var(--border);
        margin: 0 4px;
        flex-shrink: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinning {
        animation: spin 0.7s linear infinite;
      }

      .spacer {
        flex: 1;
      }

      .mode-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        -webkit-app-region: no-drag;
      }
      .badge-standard {
        background: rgba(99, 102, 241, 0.18);
        color: #818cf8;
      }
      .badge-tabbed {
        background: rgba(34, 197, 94, 0.18);
        color: #4ade80;
      }
      .badge-incognito {
        background: rgba(251, 191, 36, 0.18);
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <!-- Back -->
      <button class="btn" id="btnBack" title="Go back" disabled>
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>

      <!-- Forward -->
      <button class="btn" id="btnForward" title="Go forward" disabled>
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>

      <div class="btn-divider"></div>

      <!-- Reload -->
      <button class="btn" id="btnReload" title="Reload page">
        <svg
          id="reloadIcon"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>

      <div class="spacer"></div>

      <span class="mode-badge" id="modeBadge"></span>
    </div>

    <script>
      const btnBack = document.getElementById("btnBack");
      const btnForward = document.getElementById("btnForward");
      const btnReload = document.getElementById("btnReload");
      const reloadIcon = document.getElementById("reloadIcon");
      const badgeEl = document.getElementById("modeBadge");

      // Wire buttons — toolbar-preload already has APP_ID synchronously
      btnBack.addEventListener("click", () => window.toolbar.back());
      btnForward.addEventListener("click", () => window.toolbar.forward());
      btnReload.addEventListener("click", () => window.toolbar.reload());

      // Fetch display info for mode badge
      window.toolbar
        .getInfo()
        .then((info) => {
          if (!info) return;
          const mode = info.mode || "standard";
          badgeEl.textContent = mode;
          badgeEl.className = `mode-badge badge-${mode}`;
        })
        .catch(() => {});

      // React to nav-state updates pushed from main process
      window.toolbar.onUpdate(({ canBack, canForward, loading }) => {
        if (canBack !== undefined) btnBack.disabled = !canBack;
        if (canForward !== undefined) btnForward.disabled = !canForward;
        if (loading === true) reloadIcon.classList.add("spinning");
        if (loading === false) reloadIcon.classList.remove("spinning");
      });
    </script>
  </body>
</html>
