<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'"
    />
    <title>Toolbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #1c1c22;
        --bg2: #26262e;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e0e0ec;
        --text2: #8888aa;
        --btn-hover: rgba(255, 255, 255, 0.1);
        --btn-active: rgba(255, 255, 255, 0.18);
        --radius: 7px;
      }

      html,
      body {
        width: 100%;
        height: 44px;
        overflow: hidden;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      .toolbar {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 14px 0 80px; /* 80px clears macOS traffic lights */
        gap: 8px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        -webkit-app-region: drag;
        position: relative;
      }

      /* subtle shadow that bleeds into the website below */
      .toolbar::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 0;
        right: 0;
        height: 8px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.15),
          transparent
        );
        pointer-events: none;
      }

      /* ── Reload button ── */
      .btn-reload {
        width: 28px;
        height: 28px;
        border-radius: var(--radius);
        border: none;
        background: none;
        color: var(--text2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        -webkit-app-region: no-drag;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .btn-reload:hover {
        background: var(--btn-hover);
        color: var(--text);
      }
      .btn-reload:active {
        background: var(--btn-active);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinning {
        animation: spin 0.7s linear infinite;
      }

      /* ── Centre: app chip ── */
      .center {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        -webkit-app-region: drag;
      }

      .app-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 12px 4px 7px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.06);
        max-width: 260px;
        pointer-events: none;
      }

      .app-icon {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
        overflow: hidden;
      }
      .app-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 4px;
      }

      .app-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Right: mode badge ── */
      .right {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      .mode-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        -webkit-app-region: no-drag;
      }
      .badge-standard {
        background: rgba(99, 102, 241, 0.18);
        color: #818cf8;
      }
      .badge-tabbed {
        background: rgba(34, 197, 94, 0.18);
        color: #4ade80;
      }
      .badge-incognito {
        background: rgba(251, 191, 36, 0.18);
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <!-- Left: reload -->
      <button class="btn-reload" id="btnReload" title="Reload">
        <svg
          id="reloadIcon"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>

      <!-- Centre: icon + name -->
      <!-- <div class="center">
        <div class="app-chip">
          <div class="app-icon" id="appIcon"></div>
          <span class="app-name" id="appName"></span>
        </div>
      </div> -->

      <!-- Right: mode badge -->
      <div class="right">
        <span class="mode-badge" id="modeBadge"></span>
      </div>
    </div>

    <script>
      const reloadIcon = document.getElementById("reloadIcon");
      const btnReload = document.getElementById("btnReload");
      const appIconEl = document.getElementById("appIcon");
      const appNameEl = document.getElementById("appName");
      const badgeEl = document.getElementById("modeBadge");

      // ── Fetch app info from main process via IPC (no URL param length limits) ──
      window.toolbar.getInfo().then((info) => {
        if (!info) return;

        // Name
        appNameEl.textContent = info.name || "App";

        // Icon: prefer uploaded image, fall back to emoji
        if (info.iconDataUrl) {
          appIconEl.innerHTML = `<img src="${info.iconDataUrl}" alt="${info.name}" />`;
        } else {
          appIconEl.textContent = info.icon || "🌐";
        }

        // Mode badge
        const mode = info.mode || "standard";
        badgeEl.textContent = mode;
        badgeEl.className = `mode-badge badge-${mode}`;

        // Wire reload now that we have the appId
        btnReload.addEventListener("click", () =>
          window.toolbar.reload(info.appId),
        );
      });

      // ── Loading spinner ────────────────────────────────────────────────────────
      window.toolbar.onUpdate(({ loading }) => {
        if (loading === true) reloadIcon.classList.add("spinning");
        if (loading === false) reloadIcon.classList.remove("spinning");
      });
    </script>
  </body>
</html>
